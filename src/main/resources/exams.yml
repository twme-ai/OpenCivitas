exams:
  miner:
    qualification: miner
    passing-score: 3
    randomize-questions: true
    title:
      en_US: '<gold>Miner Certification</gold>'
      zh_TW: '<gold>礦工資格考試</gold>'
    description:
      en_US: '<gray>This original sample exam covers OpenCivitas career rules.</gray>'
      zh_TW: '<gray>此原創範例考試涵蓋 OpenCivitas 的職業規則。</gray>'
    questions:
      job-limit:
        prompt:
          en_US: 'How many trade jobs may a citizen hold at once?'
          zh_TW: '一位市民可同時擁有幾個一般職業？'
        options:
          A:
            text: {en_US: 'One', zh_TW: '一個'}
          B:
            text: {en_US: 'Two', zh_TW: '兩個'}
            correct: true
          C:
            text: {en_US: 'Unlimited', zh_TW: '無限制'}
      qualification:
        prompt:
          en_US: 'What is required before self-enrolling in a trade?'
          zh_TW: '自行加入一般職業前需要什麼？'
        options:
          A:
            text: {en_US: 'The matching qualification', zh_TW: '對應的資格'}
            correct: true
          B:
            text: {en_US: 'A government appointment', zh_TW: '政府任命'}
          C:
            text: {en_US: 'No requirement', zh_TW: '不需要任何條件'}
      payments:
        prompt:
          en_US: 'Which command shows your auditable account history?'
          zh_TW: '哪個指令可查看可稽核的帳戶紀錄？'
        options:
          A:
            text: {en_US: '/balance', zh_TW: '/balance'}
          B:
            text: {en_US: '/transactions', zh_TW: '/transactions'}
            correct: true
          C:
            text: {en_US: '/jobs', zh_TW: '/jobs'}

  entrepreneur:
    qualification: entrepreneur
    passing-score: 2
    randomize-questions: true
    title:
      en_US: '<gold>Entrepreneur Certification</gold>'
      zh_TW: '<gold>企業家資格考試</gold>'
    description:
      en_US: '<gray>This original sample exam covers responsible business operation.</gray>'
      zh_TW: '<gray>此原創範例考試涵蓋負責任的企業經營。</gray>'
    questions:
      records:
        prompt:
          en_US: 'Why should business transfers retain an audit trail?'
          zh_TW: '企業交易為何應保留稽核紀錄？'
        options:
          A:
            text: {en_US: 'For accountability and dispute resolution', zh_TW: '為了問責與處理爭議'}
            correct: true
          B:
            text: {en_US: 'To hide account activity', zh_TW: '為了隱藏帳戶活動'}
          C:
            text: {en_US: 'They should not retain one', zh_TW: '不應保留紀錄'}
      funds:
        prompt:
          en_US: 'Which practice keeps personal and company funds clear?'
          zh_TW: '哪種做法能清楚區分個人與公司資金？'
        options:
          A:
            text: {en_US: 'Use separate, auditable accounts', zh_TW: '使用分開且可稽核的帳戶'}
            correct: true
          B:
            text: {en_US: 'Record nothing', zh_TW: '完全不記錄'}
          C:
            text: {en_US: 'Share one player password', zh_TW: '共用一組玩家密碼'}

  lawyer:
    qualification: lawyer
    passing-score: 2
    randomize-questions: true
    title:
      en_US: '<gold>Legal Practice Qualification</gold>'
      zh_TW: '<gold>法律執業資格考試</gold>'
    description:
      en_US: '<gray>This original sample exam covers consent and legal records.</gray>'
      zh_TW: '<gray>此原創範例考試涵蓋同意與法律紀錄。</gray>'
    questions:
      consent:
        prompt:
          en_US: 'What must a lawyer verify before officiating a marriage?'
          zh_TW: '律師主持婚姻前必須確認什麼？'
        options:
          A:
            text: {en_US: 'Both prospective spouses gave current consent', zh_TW: '雙方準配偶均已明確同意'}
            correct: true
          B:
            text: {en_US: 'Only one person requested it', zh_TW: '只有一人提出要求'}
          C:
            text: {en_US: 'No record is needed', zh_TW: '不需要任何紀錄'}
      records:
        prompt:
          en_US: 'Why should marriage and divorce actions be auditable?'
          zh_TW: '婚姻與離婚操作為何應可供稽核？'
        options:
          A:
            text: {en_US: 'To establish status, consent, and responsibility', zh_TW: '為了確認身分、同意與責任'}
            correct: true
          B:
            text: {en_US: 'To publish private partner chat', zh_TW: '為了公開伴侶私人聊天'}
          C:
            text: {en_US: 'To bypass both spouses', zh_TW: '為了繞過雙方配偶'}

  driver:
    qualification: driver
    passing-score: 3
    randomize-questions: true
    title:
      en_US: '<gold>Driver Qualification</gold>'
      zh_TW: '<gold>駕駛資格考試</gold>'
    description:
      en_US: '<gray>This original exam covers responsible road use and vehicle management.</gray>'
      zh_TW: '<gray>此原創考試涵蓋負責任的道路使用與載具管理。</gray>'
    questions:
      road-side:
        prompt:
          en_US: 'Which side of a two-way road should you normally drive on?'
          zh_TW: '在雙向道路上通常應靠哪一側行駛？'
        options:
          A:
            text: {en_US: 'The right side', zh_TW: '右側'}
            correct: true
          B:
            text: {en_US: 'The left side', zh_TW: '左側'}
          C:
            text: {en_US: 'The pavement', zh_TW: '人行道'}
      road-area:
        prompt:
          en_US: 'Where should road vehicles be driven?'
          zh_TW: '道路載具應在哪裡行駛？'
        options:
          A:
            text: {en_US: 'Within marked road areas', zh_TW: '標示的道路範圍內'}
            correct: true
          B:
            text: {en_US: 'Across any private plot', zh_TW: '穿越任何私人地產'}
          C:
            text: {en_US: 'Only on pavements', zh_TW: '只在人行道上'}
      impairment:
        prompt:
          en_US: 'When is driving under the influence acceptable?'
          zh_TW: '何時可以酒後或受藥物影響駕駛？'
        options:
          A:
            text: {en_US: 'Never', zh_TW: '任何時候都不可以'}
            correct: true
          B:
            text: {en_US: 'When the road is empty', zh_TW: '道路無人時'}
          C:
            text: {en_US: 'When the vehicle is unlocked', zh_TW: '載具未上鎖時'}
      parking:
        prompt:
          en_US: 'What may happen to an improperly parked vehicle?'
          zh_TW: '違規停放的載具可能會如何？'
        options:
          A:
            text: {en_US: 'It may be impounded', zh_TW: '可能被拖吊扣押'}
            correct: true
          B:
            text: {en_US: 'It receives free fuel', zh_TW: '獲得免費燃料'}
          C:
            text: {en_US: 'Ownership is erased', zh_TW: '所有權會被刪除'}

  pilot:
    qualification: pilot
    passing-score: 3
    randomize-questions: true
    title:
      en_US: '<gold>Pilot Qualification</gold>'
      zh_TW: '<gold>飛行員資格考試</gold>'
    description:
      en_US: '<gray>This original exam covers lawful aircraft operation and controls.</gray>'
      zh_TW: '<gray>此原創考試涵蓋合法的飛行載具操作與控制。</gray>'
    questions:
      qualification:
        prompt:
          en_US: 'What must you hold before operating an aircraft?'
          zh_TW: '操作飛行載具前必須具備什麼？'
        options:
          A:
            text: {en_US: 'A pilot qualification', zh_TW: '飛行員資格'}
            correct: true
          B:
            text: {en_US: 'Only a driver qualification', zh_TW: '僅需駕駛資格'}
          C:
            text: {en_US: 'No qualification', zh_TW: '不需要資格'}
      parking:
        prompt:
          en_US: 'Where may you park an aircraft without abandoning it?'
          zh_TW: '飛行載具應停放在哪裡才不構成棄置？'
        options:
          A:
            text: {en_US: 'On property where you have permission', zh_TW: '你擁有權限的地產上'}
            correct: true
          B:
            text: {en_US: 'Across a public road', zh_TW: '公共道路中央'}
          C:
            text: {en_US: 'Inside another citizen''s locked plot', zh_TW: '其他市民上鎖的地產內'}
      altitude:
        prompt:
          en_US: 'Which control increases aircraft altitude?'
          zh_TW: '哪個按鍵可提升飛行載具高度？'
        options:
          A:
            text: {en_US: 'Jump', zh_TW: '跳躍鍵'}
            correct: true
          B:
            text: {en_US: 'Drop item', zh_TW: '丟棄物品鍵'}
          C:
            text: {en_US: 'Open inventory', zh_TW: '開啟背包鍵'}
      acquisition:
        prompt:
          en_US: 'How should an aircraft be acquired?'
          zh_TW: '應如何取得飛行載具？'
        options:
          A:
            text: {en_US: 'Purchase or trade it lawfully', zh_TW: '透過合法購買或交易'}
            correct: true
          B:
            text: {en_US: 'Take another owner''s aircraft', zh_TW: '拿走其他車主的飛行載具'}
          C:
            text: {en_US: 'Duplicate its registration', zh_TW: '複製其登記資料'}
