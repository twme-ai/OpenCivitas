name: OpenCivitas
version: '0.1.0-SNAPSHOT'
main: dev.opencivitas.OpenCivitasPlugin
description: Open-source civic city roleplay systems for Paper.
api-version: '1.21.11'
authors: [OpenCivitas contributors]
website: https://github.com/twme-ai/OpenCivitas
libraries:
  - org.xerial:sqlite-jdbc:3.53.2.0
  - redis.clients:jedis:7.5.3
commands:
  balance:
    description: View an account balance.
    usage: /balance [player]
    aliases: [bal]
  pay:
    description: Transfer money to another player.
    usage: /pay <player> <amount>
  transactions:
    description: View recent account transactions.
    usage: /transactions [page]
  baltop:
    description: View the highest personal account balances.
    usage: /baltop [page]
  about:
    description: View a citizen profile.
    usage: /about [player]
  locale:
    description: Select a message language.
    usage: /locale [list|set <locale>|reset]
  jobs:
    description: View a citizen's active jobs.
    usage: /jobs [player]
  job:
    description: Browse, join, leave, or manage jobs.
    usage: /job <list|join|quit|employ|fire>
  qualifications:
    description: View a citizen's qualifications.
    usage: /qualifications [player]
  qualification:
    description: Manage citizen qualifications.
    usage: /qualification <grant|revoke> <player> <qualification>
  licenses:
    description: View a citizen's active licenses.
    usage: /licenses [player]
  license:
    description: Grant or revoke citizen licenses.
    usage: /license <grant|revoke> <player> <license> [days|permanent]
  setprefix:
    description: Select one of your jobs as your displayed prefix.
    usage: /setprefix <job|clear>
  quitjob:
    description: Leave a trade job.
    usage: /quitjob <job>
  quitprofession:
    description: Leave your current profession.
    usage: /quitprofession
  exams:
    description: List, start, answer, or leave a university exam.
    usage: /exams <list|start <exam>|answer <letter>|quit>
  university:
    description: Travel to the university or set its warp.
    usage: /university [setwarp]
  business:
    description: Create and manage player businesses.
    usage: /business <create|info|list|deposit|withdraw|pay|offer|accept|deny|offers|staff|fire|resign|role|wage|payroll|transferproprietorship|transactions|sales|disband>
    aliases: [democracybusiness, db, firm, company]
  find:
    description: Find active chest shops selling or buying an item.
    usage: /find <item>
  chestshop:
    description: View chest shop transaction history.
    usage: /chestshop history [page]
    aliases: [csn, shop]
  claim:
    description: Create and manage wilderness claims.
    usage: /claim <list|info|create|buy|trust|untrust|delete>
  claimwand:
    description: Receive the daily wilderness claim wand.
    usage: /claimwand
  giveclaim:
    description: Transfer the wilderness claim at your location.
    usage: /giveclaim <player>
  claimexplosions:
    description: Toggle explosions in the wilderness claim at your location.
    usage: /claimexplosions
  claimkickout:
    description: Remove a player from your wilderness claim.
    usage: /claimkickout kickout <player>
  realestate:
    description: Search, buy, rent, and manage real-estate plots.
    usage: /realestate <help|me|buy|rent|unrent|search|info|add|remove|set>
    aliases: [rl, realty]
  auction:
    description: Browse, list, bid on, buy, and claim auction items.
    usage: /auction <open|sell|bid|buy|cancel|claims|claim|mine|search>
    aliases: [ah, auctions]
  election:
    description: View elections, nominate candidates, and cast ranked ballots.
    usage: /election <list|offices|info|nominate|withdraw|ballot|results|terms>
    aliases: [elections]
  bill:
    description: Draft, debate, vote on, and enact legislation.
    usage: /bill <list|info|text|events|create|submit|withdraw|amend|vote|tally|assent|veto|override>
    aliases: [bills, legislation]
  laws:
    description: List the active law codex.
    usage: /laws [page]
  law:
    description: Read an enacted law.
    usage: /law <number|id>
  case:
    description: File, view, hear, decide, and appeal court cases.
    usage: /case <list|info|docket|file|counsel|claim|schedule|hearing|evidence|evidenceitem|motion|order|warrant|verdict|appeal>
    aliases: [cases, court]
  records:
    description: View a citizen's public criminal record.
    usage: /records [player]
  warrants:
    description: View a citizen's active court warrants.
    usage: /warrants [player]
  police:
    description: Manage combat consent, police reports, evidence, charges, arrests, and custody.
    usage: /police <consent|reports|report|claim|dismiss|charge|charge-report|void|arrest|evidence|offenses|wanted|custody|setjail|setrelease>
  911:
    description: Report your latest unlawful PvP death to police.
    usage: /911
  wanted:
    description: View a citizen's active police charges.
    usage: /wanted [player]
  health:
    description: View symptoms and temperature, call a doctor, and manage public health.
    usage: /health <symptoms|temperature|list|diagnose|call|calls|buy|monitor|pharmacy|medicine|expose>
  doctor-attend:
    description: Claim a medical call and travel to its patient.
    usage: /doctor-attend <player>
  bulkbill:
    description: Claim the latest eligible Medicare treatment benefit.
    usage: /bulkbill <patient>
  doh:
    description: Toggle or send a Department of Health channel message.
    usage: /doh [message]
  g:
    description: Switch to global chat.
    usage: /g
    aliases: [global]
  l:
    description: Switch to local chat.
    usage: /l
    aliases: [local]
  murmur:
    description: Switch to close-range murmur chat.
    usage: /murmur
  doj:
    description: Switch to the Department of Justice channel.
    usage: /doj
  sen:
    description: Switch to the Senate channel.
    usage: /sen
  jud:
    description: Switch to the judiciary channel.
    usage: /jud
  msg:
    description: Send a private message to an online player.
    usage: /msg <player> <message>
    aliases: [tell]
  r:
    description: Reply to your most recent private-message contact.
    usage: /r <message>
  mail:
    description: Send and read persistent offline mail.
    usage: /mail <send|inbox|read|delete>
  ad:
    description: Broadcast a qualification-gated advertisement.
    usage: /ad <message>
  ask:
    description: Ask the server help channel a question.
    usage: /ask <message>
  sethome:
    description: Save a named home at your current location.
    usage: /sethome <name>
  home:
    description: List homes or travel to a named home.
    usage: /home [name]
  homes:
    description: List your named homes.
    usage: /homes
  delhome:
    description: Delete a named home.
    usage: /delhome <name>
  civicwarp:
    description: List or configure civic warp destinations.
    usage: /civicwarp <list|set|remove>
  coords:
    description: Show your current coordinates.
    usage: /coords
  sendcoords:
    description: Send your current coordinates to an online player.
    usage: /sendcoords <player>
  map:
    description: Show the configured web map link.
    usage: /map
  gps:
    description: Start or stop compass navigation to a registered plot.
    usage: /gps <start <plot>|stop>
  directions:
    description: Show the bearing and distance to a registered plot.
    usage: /directions <plot>
  spawn:
    description: Travel to the central spawn.
    usage: /spawn
  spawn-north:
    description: Travel to North Spawn.
    usage: /spawn-north
    aliases: [zoo]
  spawn-south:
    description: Travel to South Spawn.
    usage: /spawn-south
    aliases: [courts]
  spawn-university:
    description: Travel to the university civic warp.
    usage: /spawn-university
  spawn-airport:
    description: Travel to the airport.
    usage: /spawn-airport
    aliases: [airport]
  spawn-oakridge:
    description: Travel to Oakridge.
    usage: /spawn-oakridge
    aliases: [oakridge]
  spawn-willow:
    description: Travel to Willow.
    usage: /spawn-willow
    aliases: [willow]
  spawn-aventura:
    description: Travel to Aventura.
    usage: /spawn-aventura
    aliases: [aventura]
  friend:
    description: Send, answer, list, and remove reciprocal friend requests.
    usage: /friend <add|accept|decline|remove|list> [player]
    aliases: [friends]
  marriage:
    description: Propose, consent to, officiate, and manage a marriage.
    usage: /marriage <info|propose|accept|decline|officiate|divorce|sethome|home|pvp|chat>
    aliases: [marry]
  partnerchat:
    description: Send a private message to your online spouse.
    usage: /partnerchat <message>
    aliases: [pc]
  partnerhome:
    description: Travel to your shared partner home.
    usage: /partnerhome
  setpartnerhome:
    description: Set the shared partner home.
    usage: /setpartnerhome
  partnerpvp:
    description: Opt in or out of PvP with your spouse.
    usage: /partnerpvp <on|off>
  vehicle:
    description: Manage owned vehicles, fuel, locks, repairs, and transfers.
    usage: /vehicle <list|types|info|lock|refuel|repair|pickup|transfer>
    aliases: [vehicles, car]
  recipes:
    description: Browse mechanic parts, vehicle, fuel, and repair recipes.
    usage: /recipes
  stock:
    description: Use private exchanges, limit orders, portfolios, shareholder registers, and dividends.
    usage: /stock <listings|quote|portfolio|orders|buy|sell|cancel|trades|holders>
    aliases: [stocks, exchange, market]
  network:
    description: Inspect this OpenCivitas node and live network presence.
    usage: /network [status|servers|who <player>]
    aliases: [net]
permissions:
  opencivitas.balance.others:
    description: View another player's balance.
    default: true
  opencivitas.about.others:
    description: View another player's public profile.
    default: true
  opencivitas.jobs.others:
    description: View another player's jobs and qualifications.
    default: true
  opencivitas.jobs.manage:
    description: Appoint and dismiss citizens from jobs.
    default: op
  opencivitas.qualifications.manage:
    description: Grant and revoke citizen qualifications.
    default: op
  opencivitas.licenses.manage:
    description: Grant and revoke citizen licenses.
    default: op
  opencivitas.university.setwarp:
    description: Set the university warp.
    default: op
  opencivitas.vehicles.manage:
    description: Give vehicle items, fuel, and repair kits.
    default: op
  opencivitas.stocks.manage:
    description: Halt or resume any stock listing for regulatory administration.
    default: op
  opencivitas.business.list.others:
    description: View another citizen's businesses.
    default: true
  opencivitas.business.audit:
    description: View any business account and transaction history.
    default: op
  opencivitas.claims.bypass:
    description: Build and interact in any wilderness claim.
    default: op
  opencivitas.property.manage:
    description: Register plots and administratively manage titleholders and tenants.
    default: op
  opencivitas.property.bypass:
    description: Build and interact in any registered property.
    default: op
  opencivitas.elections.manage:
    description: Create, close, and cancel elections and referendums.
    default: op
  opencivitas.police.configure:
    description: Configure police jail and release locations.
    default: op
  opencivitas.health.configure:
    description: Configure medical call monitors and administer health test operations.
    default: op
  opencivitas.navigation.configure:
    description: Create and remove civic warp destinations.
    default: op
  opencivitas.network.inspect:
    description: Inspect UUID-based player presence across configured OpenCivitas nodes.
    default: true
