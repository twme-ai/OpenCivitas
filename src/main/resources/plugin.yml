name: OpenCivitas
version: '0.1.0-SNAPSHOT'
main: dev.opencivitas.OpenCivitasPlugin
description: Open-source civic city roleplay systems for Paper.
api-version: '1.21.11'
authors: [OpenCivitas contributors]
website: https://github.com/twme-ai/OpenCivitas
libraries:
  - org.xerial:sqlite-jdbc:3.53.2.0
commands:
  balance:
    description: View an account balance.
    usage: /balance [player]
    aliases: [bal]
  pay:
    description: Transfer money to another player.
    usage: /pay <player> <amount>
  transactions:
    description: View recent account transactions.
    usage: /transactions [page]
  about:
    description: View a citizen profile.
    usage: /about [player]
  locale:
    description: Select a message language.
    usage: /locale [list|set <locale>|reset]
  jobs:
    description: View a citizen's active jobs.
    usage: /jobs [player]
  job:
    description: Browse, join, leave, or manage jobs.
    usage: /job <list|join|quit|employ|fire>
  qualifications:
    description: View a citizen's qualifications.
    usage: /qualifications [player]
  qualification:
    description: Manage citizen qualifications.
    usage: /qualification <grant|revoke> <player> <qualification>
  quitjob:
    description: Leave a trade job.
    usage: /quitjob <job>
  quitprofession:
    description: Leave your current profession.
    usage: /quitprofession
  exams:
    description: List, start, answer, or leave a university exam.
    usage: /exams <list|start <exam>|answer <letter>|quit>
  university:
    description: Travel to the university or set its warp.
    usage: /university [setwarp]
  business:
    description: Create and manage player businesses.
    usage: /business <create|info|list|deposit|withdraw|pay|transactions|disband>
    aliases: [democracybusiness, db, firm, company]
permissions:
  opencivitas.balance.others:
    description: View another player's balance.
    default: true
  opencivitas.about.others:
    description: View another player's public profile.
    default: true
  opencivitas.jobs.others:
    description: View another player's jobs and qualifications.
    default: true
  opencivitas.jobs.manage:
    description: Appoint and dismiss citizens from jobs.
    default: op
  opencivitas.qualifications.manage:
    description: Grant and revoke citizen qualifications.
    default: op
  opencivitas.university.setwarp:
    description: Set the university warp.
    default: op
  opencivitas.business.list.others:
    description: View another citizen's businesses.
    default: true
  opencivitas.business.audit:
    description: View any business account and transaction history.
    default: op
